apiVersion: v1
kind: Service
metadata:
  name: {{ include "portfolio-tracker.fullname" . }}
  labels:
    {{- include "portfolio-tracker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "portfolio-tracker.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5173
