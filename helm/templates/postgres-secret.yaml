{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portfolio-tracker.fullname" . }}-postgres
  labels:
    {{- include "portfolio-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  postgres-password: {{ .Values.postgres.auth.password | quote }}
{{- end }}
